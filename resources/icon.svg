<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Arka plan -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- İnce iç gölge çerçeve -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Ok aşağı -->
  <line x1="256" y1="130" x2="256" y2="310" stroke="url(#arrow)" stroke-width="42" stroke-linecap="round"/>
  <polyline points="156,240 256,340 356,240" fill="none" stroke="url(#arrow)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Alt çizgi -->
  <line x1="156" y1="390" x2="356" y2="390" stroke="rgba(255,255,255,0.5)" stroke-width="28" stroke-linecap="round"/>
</svg>
